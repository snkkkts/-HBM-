// ========================================================================
//  【修复 #7】Haversine 地理距离（km）替代欧氏距离
// ========================================================================
function haversineKm(lat1, lng1, lat2, lng2) {
    const R = 6371;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLng = (lng2 - lng1) * Math.PI / 180;
    const a = Math.sin(dLat / 2) ** 2 +
              Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
              Math.sin(dLng / 2) ** 2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

// 空间邻域阈值：60 km（原来 0.6° ≈ 60-66 km，现在用精确值）
const NEIGHBOR_THRESHOLD_KM = 60;

// ========================================================================
//  【修复 #2】判断碳排放是否"有效"（非 null、非 NaN、> 0）
// ========================================================================
function isValidEmission(val) {
    return val != null && !isNaN(val) && Number(val) > 0;
}

// ========================================================================
//  空间权重矩阵 — 使用 Haversine
// ========================================================================
function ensureRegionCentersFromData(data) {
    if (Object.keys(regionCenters).length > 0) return;
    const uniqueNames = [...new Set(data.filter(d => d.name).map(d => d.name))];
    uniqueNames.forEach((name) => {
        const hash = (s) => {
            let h = 0;
            for (let i = 0; i < s.length; i++) h = (h << 5) - h + s.charCodeAt(i);
            return Math.abs(h);
        };
        const seed = hash(name);
        const lat = 27.0 + (seed % 300) / 100.0;
        const lng = 111.0 + ((seed >> 8) % 350) / 100.0;
        regionCenters[name] = { lat, lng };
    });
}

function buildWeightMatrix() {
    const regions = Object.keys(regionCenters);
    if (regions.length === 0) return {};
    const W = {};
    regions.forEach(i => {
        W[i] = {};
        let rowSum = 0;
        regions.forEach(j => {
            if (i !== j) {
                const p1 = regionCenters[i], p2 = regionCenters[j];
                const dist = haversineKm(p1.lat, p1.lng, p2.lat, p2.lng);
                let w = (dist < NEIGHBOR_THRESHOLD_KM) ? 1.0 / (dist + 1e-6) : 0;
                if (regions.length <= 5) w = 1.0;
                W[i][j] = w;
                rowSum += w;
            } else {
                W[i][j] = 0;
            }
        });
        if (rowSum > 0) regions.forEach(j => W[i][j] /= rowSum);
        else regions.forEach(j => { if (j !== i) W[i][j] = 1.0 / (regions.length - 1); });
    });
    return W;
}

function calcSpatialLag(targetRegion, valuesDict, W) {
    if (!W[targetRegion]) return 0;
    let lag = 0;
    Object.keys(W[targetRegion]).forEach(neighbor => {
        lag += W[targetRegion][neighbor] * (valuesDict[neighbor] || 0);
    });
    return lag;
}

// ========================================================================
//  【修复 #3】可复现的伪随机 + 真正的 MCMC 采样
// ========================================================================

// 可种子化的伪随机数生成器 (xorshift128+)
function createSeededRng(seed) {
    let s0 = seed | 0 || 1;
    let s1 = (seed >>> 16) ^ 0xDEADBEEF;
    return function () {
        let x = s0;
        const y = s1;
        s0 = y;
        x ^= x << 23;
        x ^= x >> 17;
        x ^= y ^ (y >> 26);
        s1 = x;
        return ((x + y) >>> 0) / 4294967296;
    };
}

function seededNormal(rng, mu, sd) {
    const u1 = rng(), u2 = rng();
    const z = Math.sqrt(-2 * Math.log(u1 + 1e-15)) * Math.cos(2 * Math.PI * u2);
    return mu + z * sd;
}

/**
 * 简化 MCMC (Metropolis-Hastings) 采样
 * 固定种子 → 每次加载结果一致
 * 500 次迭代 + 200 次 burn-in
 */
function mcmcSampleParams(data, regionCenters, W, maxRealYear) {
    const rng = createSeededRng(42);
    const ITERATIONS = 500;
    const BURN_IN = 200;

    // 先验
    const prior = {
        tau:   { mu: 0.7,  sd: 0.15 },
        rho:   { mu: 0.3,  sd: 0.1  },
        beta:  { mu: 0.2,  sd: 0.08 },
        theta: { mu: 0.15, sd: 0.07 }
    };

    // 准备观测数据对 (y_{t}, y_{t-1}, …)
    const regions = Object.keys(regionCenters);
    const obs = [];
    regions.forEach(region => {
        const rows = data
            .filter(d => d.name === region && isValidEmission(d.Carbon_Emission))
            .sort((a, b) => Number(a.year) - Number(b.year));
        for (let i = 1; i < rows.length; i++) {
            const y = Number(rows[i].Carbon_Emission);
            const yPrev = Number(rows[i - 1].Carbon_Emission);
            const gdp = Number(rows[i].GDP) || 0;

            // 空间滞后 y_{t-1}
            const prevDict = {};
            data.filter(d => Number(d.year) === Number(rows[i - 1].year) && isValidEmission(d.Carbon_Emission))
                .forEach(d => { prevDict[d.name] = Number(d.Carbon_Emission); });
            const wPrevY = calcSpatialLag(region, prevDict, W);

            // 空间滞后 GDP_t
            const gdpDict = {};
            data.filter(d => Number(d.year) === Number(rows[i].year) && d.GDP != null)
                .forEach(d => { gdpDict[d.name] = Number(d.GDP); });
            const wGDP = calcSpatialLag(region, gdpDict, W);

            obs.push({ y, yPrev, gdp: gdp / 1e6, wPrevY, wGDP });
        }
    });

    if (obs.length === 0) {
        return { tau: prior.tau.mu, rho: prior.rho.mu, beta: prior.beta.mu, theta: prior.theta.mu };
    }

    // 对数后验（高斯似然 + 高斯先验）
    function logPosterior(params) {
        const { tau, rho, beta, theta } = params;
        let ll = 0;
        const sigma2 = 1e10; // 观测噪声方差
        obs.forEach(o => {
            const pred = tau * o.yPrev + rho * o.wPrevY + beta * o.gdp + theta * o.wGDP;
            ll -= (o.y - pred) ** 2 / (2 * sigma2);
        });
        // 先验
        ll -= (tau   - prior.tau.mu)   ** 2 / (2 * prior.tau.sd   ** 2);
        ll -= (rho   - prior.rho.mu)   ** 2 / (2 * prior.rho.sd   ** 2);
        ll -= (beta  - prior.beta.mu)  ** 2 / (2 * prior.beta.sd  ** 2);
        ll -= (theta - prior.theta.mu) ** 2 / (2 * prior.theta.sd ** 2);
        return ll;
    }

    // M-H 采样
    let current = {
        tau:   prior.tau.mu,
        rho:   prior.rho.mu,
        beta:  prior.beta.mu,
        theta: prior.theta.mu
    };
    let currentLP = logPosterior(current);
    const stepSize = 0.02;
    const samples = [];

    for (let i = 0; i < ITERATIONS + BURN_IN; i++) {
        const proposal = {
            tau:   current.tau   + seededNormal(rng, 0, stepSize),
            rho:   current.rho   + seededNormal(rng, 0, stepSize),
            beta:  current.beta  + seededNormal(rng, 0, stepSize),
            theta: current.theta + seededNormal(rng, 0, stepSize)
        };
        const proposalLP = logPosterior(proposal);
        const logAlpha = proposalLP - currentLP;
        if (Math.log(rng() + 1e-15) < logAlpha) {
            current = proposal;
            currentLP = proposalLP;
        }
        if (i >= BURN_IN) {
            samples.push({ ...current });
        }
    }

    // 后验均值
    const result = { tau: 0, rho: 0, beta: 0, theta: 0 };
    samples.forEach(s => {
        result.tau   += s.tau;
        result.rho   += s.rho;
        result.beta  += s.beta;
        result.theta += s.theta;
    });
    const n = samples.length;
    result.tau   /= n;
    result.rho   /= n;
    result.beta  /= n;
    result.theta /= n;

    return result;
}


// ========================================================================
//  HBM 预测引擎
// ========================================================================
function computeDynamicPredictions(data) {
    document.getElementById('modelStatus').innerText = 'HBM贝叶斯推演中...';
    document.getElementById('modelStatus').className = 'font-bold text-orange-500 animate-pulse';

    // 长株潭区县列表
    const cztNames = [
        '芙蓉区','天心区','岳麓区','开福区','雨花区','望城区','长沙县','浏阳市','宁乡市',
        '荷塘区','芦淞区','石峰区','天元区','渌口区','攸县','茶陵县','炎陵县','醴陵市',
        '雨湖区','岳塘区','湘潭县','湘乡市','韶山市'
    ];
    function isCZT(regionName) {
        if (!regionName) return false;
        return cztNames.some(name => regionName.includes(name) || name.includes(regionName));
    }

    // 数据清洗
    data.forEach(row => {
        for (const key in row) {
            if (row[key] === '' || row[key] === ' ') row[key] = null;
        }
        // 【修复 #10】确保 year 为数字
        if (row.year != null) row.year = Number(row.year);
        // 计算 VANUI
        if (row.NTL_mean != null && row.NDVI_mean != null && row.VANUI == null) {
            row.VANUI = (1 - Number(row.NDVI_mean)) * Number(row.NTL_mean);
        }
        row.isPredicted = false;
    });

    // 真实历史最大年份
    const validRecords = data.filter(d => isValidEmission(d.Carbon_Emission));
    if (validRecords.length === 0) return data;
    const maxRealYear = Math.max(...validRecords.map(d => Number(d.year)));
    globalMaxRealYear = maxRealYear;

    if (Object.keys(regionCenters).length === 0) return data;

    // 空间权重矩阵
    const W = buildWeightMatrix();
    const fullData = JSON.parse(JSON.stringify(data));
    const targetMaxYear = 2024;

    const allRegions = Object.keys(regionCenters);
    const targetRegions = allRegions.filter(r => isCZT(r));
    if (targetRegions.length === 0) {
        console.warn('未匹配到长株潭区县');
        return fullData;
    }

    // 【修复 #3】MCMC 采样后验参数（固定种子，可复现）
    const params = mcmcSampleParams(fullData, regionCenters, W, maxRealYear);
    const { tau, rho, beta, theta } = params;
    console.log('MCMC 后验参数:', params);

    // 历史增长率
    const growthRates = {};
    targetRegions.forEach(region => {
        const regionData = fullData.filter(d => d.name === region && d.year <= maxRealYear).sort((a, b) => a.year - b.year);
        growthRates[region] = {};
        ['GDP', 'VANUI'].forEach(metric => {
            const valid = regionData.filter(d => d[metric] != null && !isNaN(d[metric]) && d[metric] > 0);
            if (valid.length >= 2) {
                const first = Number(valid[0][metric]);
                const last = Number(valid[valid.length - 1][metric]);
                const span = valid[valid.length - 1].year - valid[0].year;
                const rate = Math.pow(last / first, 1 / span) - 1;
                growthRates[region][metric] = isFinite(rate) ? rate : 0.02;
            } else {
                growthRates[region][metric] = 0.02;
            }
        });
    });

    // 最后一年真实碳排放
    const lastRealEmission = {};
    targetRegions.forEach(region => {
        const lastReal = fullData
            .filter(d => d.name === region && d.year <= maxRealYear && isValidEmission(d.Carbon_Emission))
            .sort((a, b) => b.year - a.year)[0];
        lastRealEmission[region] = lastReal ? Number(lastReal.Carbon_Emission) : 0;
    });

    // 递推预测
    for (let y = maxRealYear + 1; y <= targetMaxYear; y++) {
        const prevY = {};
        const currGDP = {};
        const currVANUI = {};

        targetRegions.forEach(region => {
            const prevRecord = fullData.find(d => d.name === region && d.year === y - 1);
            if (prevRecord && isValidEmission(prevRecord.Carbon_Emission)) {
                prevY[region] = Number(prevRecord.Carbon_Emission);
            } else {
                prevY[region] = lastRealEmission[region] || 0;
            }
            const prevGDP   = prevRecord?.GDP   ?? 0;
            const prevVANUI = prevRecord?.VANUI ?? 0;
            currGDP[region]   = prevGDP   * (1 + growthRates[region].GDP);
            currVANUI[region] = prevVANUI * (1 + growthRates[region].VANUI);
        });

        targetRegions.forEach(region => {
            const W_prevY   = calcSpatialLag(region, prevY, W);
            const W_currGDP = calcSpatialLag(region, currGDP, W);
            const X_effect  = currGDP[region] / 1e6;

            let pred = tau * prevY[region] + rho * W_prevY + beta * X_effect + theta * W_currGDP;
            pred = Math.max(0, pred);

            let newRow = fullData.find(d => d.name === region && d.year === y);
            if (!newRow) {
                newRow = { name: region, year: y };
                fullData.push(newRow);
            }
            newRow.isPredicted = true;
            newRow.Carbon_Emission = pred;
            newRow.GDP   = currGDP[region];
            newRow.VANUI = currVANUI[region];
            // 人口继承
            const lastPop = fullData
                .filter(d => d.name === region && d.year <= maxRealYear && d.Population != null)
                .sort((a, b) => b.year - a.year)[0];
            if (lastPop && newRow.Population == null) newRow.Population = lastPop.Population;
        });
    }

    document.getElementById('modelStatus').innerText = 'HBM后验推断完成（MCMC 500轮，仅长株潭）';
    document.getElementById('modelStatus').className = 'font-bold text-emerald-600';
    return fullData;
}

function triggerCalculation(isInitialLoad = false) {
    // 从 GeoJSON 提取区域中心
    if (geoJsonFeatures.length > 0 && Object.keys(regionCenters).length === 0) {
        L.geoJSON(geoJsonFeatures, {
            onEachFeature: (f, l) => {
                const p = f.properties || {};
                const name = p.name || p.NAME || p.Name || p.NL_NAME_2 || p.NL_NAME_3 || p.adnm;
                if (name && l.getBounds) {
                    try {
                        const b = l.getBounds();
                        if (b && b.isValid()) {
                            const c = b.getCenter();
                            if (isFinite(c.lat) && isFinite(c.lng)) {
                                regionCenters[name.replace(/\s+/g, '')] = c;
                            }
                        }
                    } catch (e) { /* ignore */ }
                }
            }
        });
    }

    if (rawData.length > 0) {
        computedFullData = Object.keys(regionCenters).length > 0
            ? computeDynamicPredictions(rawData)
            : rawData;

        const years = [...new Set(computedFullData.map(d => d.year))].filter(y => y != null && !isNaN(y));
        if (years.length > 0) {
            const minY = Math.min(...years);
            const maxY = Math.max(...years);
            document.getElementById('yearSlider').min = minY;
            document.getElementById('yearSlider').max = maxY;
            currentYear = globalMaxRealYear || minY;
            document.getElementById('yearSlider').value = currentYear;
            document.getElementById('yearDisplay').innerText = currentYear;
        }
    }
    selectedRegion = null;
    selectedLayer = null;
    updateDashboard(isInitialLoad);
}

function setupEventListeners() {
    document.getElementById('dataFileInput').addEventListener('change', e => {
        const file = e.target.files[0];
        if (!file) return;
        const name = file.name.toLowerCase();
        if (name.endsWith('.csv')) {
            Papa.parse(file, {
                header: true, dynamicTyping: true, skipEmptyLines: true,
                complete: r => {
                    rawData = r.data;
                    rawData.forEach(row => { if (row.year != null) row.year = Number(row.year); });
                    alert('新数据已加载，HBM重新推演中...');
                    triggerCalculation();
                }
            });
        } else if (name.endsWith('.xlsx') || name.endsWith('.xls')) {
            const reader = new FileReader();
            reader.onload = ev => {
                try {
                    const buf = new Uint8Array(ev.target.result);
                    const wb = XLSX.read(buf, { type: 'array' });
                    rawData = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { defval: null });
                    rawData.forEach(row => { if (row.year != null) row.year = Number(row.year); });
                    alert('新数据已加载，HBM重新推演中...');
                    triggerCalculation();
                } catch (err) {
                    alert('解析失败: ' + err.message);

            };

        }
    });

        currentYear = Number(e.target.value);        // 【修复 #10】数字类型
        document.getElementById('yearDisplay').innerText = currentYear;

function getColor(v, min, max) {
    if (v == null || isNaN(v)) return '#f3f4f6';
    if (max === min) return '#3b82f6';
    const r = (v - min) / (max - min);
    if (r > 0.7)  return '#7f1d1d';
    if (r > 0.5)  return '#dc2626';
    if (r > 0.3)  return '#ea580c';
    if (r > 0.15) return '#eab308';
    if (r > 0.05) return '#10b981';
    return '#0ea5e9';
}

function findRowData(gname, ydata) {
    if (!gname || !ydata) return null;
    const cgname = gname.replace(/\s+/g, '');
    return ydata.find(d => {
        if (!d.name) return false;
        const dn = d.name.replace(/\s+/g, '');
        return dn === cgname || dn === cgname + '区' || dn === cgname + '县' || dn === cgname + '市' || cgname.includes(dn);
    });
}

function computeLISA(ydata) {
    lisaResults = {};
    if (Object.keys(regionCenters).length === 0) return;
    // 【修复 #2】过滤有效数据（排除 null / NaN）
    const valid = ydata.filter(d => d[currentMetric] != null && !isNaN(d[currentMetric]) && Number(d[currentMetric]) > 0);
    if (valid.length < 2) return;
    const vals = valid.map(d => Number(d[currentMetric]));
    const mean = vals.reduce((a, b) => a + b, 0) / vals.length;
    const std = Math.sqrt(vals.map(x => (x - mean) ** 2).reduce((a, b) => a + b) / vals.length);
    const z = {};
    valid.forEach(d => {
        const n = Object.keys(regionCenters).find(k => k.includes(d.name) || d.name.includes(k)) || d.name;
        z[n] = (Number(d[currentMetric]) - mean) / (std || 1);
    });

    Object.keys(regionCenters).forEach(t => {
        if (z[t] === undefined) return;
        const tp = regionCenters[t];
        let sum = 0, cnt = 0;
        Object.keys(regionCenters).forEach(n => {
            if (n !== t && z[n] !== undefined) {
                const np = regionCenters[n];
                const dist = haversineKm(tp.lat, tp.lng, np.lat, np.lng);
                if (dist < NEIGHBOR_THRESHOLD_KM) {
                    sum += z[n];
                    cnt++;
                }
            }
        });
        const lag = cnt > 0 ? sum / cnt : 0;
        const zz = z[t];
        lisaResults[t] = (zz > 0 && lag > 0)  ? 'HH'
                       : (zz < 0 && lag < 0)  ? 'LL'
                       : (zz > 0 && lag <= 0) ? 'HL'
                       : (zz <= 0 && lag > 0) ? 'LH'
                       : 'NS';
    });
}

function getLisaColor(t) {
    return t === 'HH' ? '#b91c1c' : t === 'LL' ? '#1d4ed8' : t === 'HL' ? '#f87171' : t === 'LH' ? '#60a5fa' : '#e5e7eb';
}
function getLisaLabel(t) {
    return t === 'HH' ? '高-高集聚' : t === 'LL' ? '低-低集聚' : t === 'HL' ? '高-低异常' : t === 'LH' ? '低-高异常' : '无显著';
}


function updateMapRender(isInitialLoad = false) {
    if (mapGeoJsonLayer) map.removeLayer(mapGeoJsonLayer);
    if (legendControl) map.removeControl(legendControl);
    if (labelLayerGroup) labelLayerGroup.clearLayers();

    // 【修复 #10】用 == 比较以兼容字符串/数字混合
    const ydata = computedFullData.filter(d => Number(d.year) === Number(currentYear)) || [];

    // 【修复 #2】对于碳排放，仅统计有效值（排除 null 和 0）
    const isEmission = (currentMetric === 'Carbon_Emission');
    const vals = ydata
        .filter(d => {
            if (d[currentMetric] == null || isNaN(d[currentMetric])) return false;
            if (isEmission && Number(d[currentMetric]) <= 0) return false;
            return true;
        })
        .map(d => Number(d[currentMetric]));

    const min = vals.length ? Math.min(...vals) : 0;
    const max = vals.length ? Math.max(...vals) : 1;

    if (isLisaMode && ydata.length > 0) computeLISA(ydata);

    if (geoJsonFeatures.length > 0) {
        mapGeoJsonLayer = L.geoJSON(geoJsonFeatures, {
            style: f => {
                const p = f.properties || {};
                const name = p.name || p.NAME || p.Name || p.NL_NAME_2 || p.NL_NAME_3 || p.adnm || '未知';
                const row = findRowData(name, ydata);
                const cname = row ? row.name : name;
                const pred = row && row.isPredicted;
                const hasVal = row && row[currentMetric] != null && !isNaN(row[currentMetric]) &&
                               !(isEmission && Number(row[currentMetric]) <= 0);
                return {
                    fillColor: isLisaMode
                        ? getLisaColor(lisaResults[cname])
                        : (hasVal ? getColor(Number(row[currentMetric]), min, max) : '#f3f4f6'),
                    weight: 1.5,
                    opacity: 1,
                    color: pred ? '#9333ea' : '#ffffff',
                    dashArray: pred ? '4,4' : null,
                    fillOpacity: 0.9
                };
            },
            onEachFeature: (f, l) => {
                const p = f.properties || {};
                const name = p.name || p.NAME || p.Name || p.NL_NAME_2 || p.NL_NAME_3 || p.adnm || '未知';
                const row = findRowData(name, ydata);
                const cname = row ? row.name : name;
                const unit = metricUnits[currentMetric] || '';
                const hasVal = row && row[currentMetric] != null && !isNaN(row[currentMetric]) &&
                               !(isEmission && Number(row[currentMetric]) <= 0);

                // 标签
                if (hasVal && l.getBounds) {
                    try {
                        const b = l.getBounds();
                        if (b && b.isValid()) {
                            const c = b.getCenter();
                            if (isFinite(c.lat) && isFinite(c.lng)) {
                                L.marker(c, {
                                    icon: L.divIcon({
                                        className: 'district-label',
                                        html: cname,
                                        iconSize: [80, 20],
                                        iconAnchor: [40, 10]
                                    }),
                                    interactive: false
                                }).addTo(labelLayerGroup);
                            }
                        }
                    } catch (e) { /* ignore */ }
                }

                // 【修复 #9】安全的 tooltip 构建（转义 HTML）
                const val = hasVal
                    ? Number(row[currentMetric]).toLocaleString(undefined, { maximumFractionDigits: 2 }) + ' ' + unit
                    : '无数据';
                const metricLabel = document.getElementById('metricSelector').options[
                    document.getElementById('metricSelector').selectedIndex
                ].text;
                let tip = '<div class="text-sm p-1"><strong class="text-indigo-700">' + escapeHtml(cname) + '</strong><br/>';
                if (row && row.isPredicted) {
                    tip += '<span class="text-xs bg-purple-100 text-purple-700 px-1 py-0.5 rounded">HBM预测值</span><br/>';
                }
                tip += metricLabel + ': <strong>' + val + '</strong>';
                if (isLisaMode && lisaResults[cname]) {
                    tip += '<br/>空间聚类: <strong style="color:' + getLisaColor(lisaResults[cname]) + '">' + lisaResults[cname] + '</strong>';
                }
                tip += '</div>';
                l.bindTooltip(tip, { sticky: true });

                // 交互
                l.on({
                    mouseover: e => {
                        if (e.target !== selectedLayer) {
                            e.target.setStyle({ weight: 3, color: '#1e293b', fillOpacity: 1, dashArray: null });
                        }
                    },
                    mouseout: e => {
                        if (e.target !== selectedLayer) mapGeoJsonLayer.resetStyle(e.target);
                    },
                    click: e => {
                        L.DomEvent.stopPropagation(e);
                        if (selectedLayer) mapGeoJsonLayer.resetStyle(selectedLayer);
                        selectedLayer = e.target;
                        selectedRegion = cname;
                        selectedLayer.setStyle({ weight: 4, color: '#f59e0b', fillColor: '#fde047', dashArray: '', fillOpacity: 0.9 });
                        selectedLayer.bringToFront();
                        try {
                            const b = selectedLayer.getBounds();
                            if (b && b.isValid()) map.panTo(b.getCenter());
                        } catch (err) { /* ignore */ }
                        document.getElementById('chartTitle').innerText = '单区县趋势锁定: ' + selectedRegion;
                        updateChart();
                        updatePolicyPanel(row, lisaResults[cname], cname);
                        if (document.getElementById('spilloverToggle').checked) drawSpilloverEffects(selectedRegion);
                    }
                });
            }
        }).addTo(map);

        // 地图视角
        try {
            if (mapGeoJsonLayer.getLayers().length > 0) {
                const b = mapGeoJsonLayer.getBounds();
                if (b && b.isValid()) {
                    if (isInitialLoad) {
                        map.flyToBounds(b, { padding: [30, 30], maxZoom: 10, duration: 1.5 });
                        initialMapFitDone = true;
                    } else if (!initialMapFitDone) {
                        map.fitBounds(b, { padding: [10, 10] });
                        initialMapFitDone = true;
                    }
                }
            }
        } catch (err) {
            if (isInitialLoad) { map.setView([27.8, 112.5], 7); initialMapFitDone = true; }
        }

        // 保持选中状态
        if (selectedRegion && selectedLayer) {
            mapGeoJsonLayer.eachLayer(l => {
                const n = l.feature.properties.name || l.feature.properties.adnm;
                if (n && n.replace(/\s+/g, '').includes(selectedRegion.replace(/区|县|市/g, ''))) {
                    selectedLayer = l;
                    selectedLayer.setStyle({ weight: 4, color: '#f59e0b', fillColor: '#fde047', dashArray: '', fillOpacity: 0.9 });
                }
            });
        }

        // 图例
        if (ydata.length > 0) {
            legendControl = L.control({ position: 'bottomright' });
            legendControl.onAdd = () => {
                const div = L.DomUtil.create('div', 'info legend');
                if (isLisaMode) {
                    div.innerHTML += '<strong class="block mb-2 font-bold">局部空间聚类 (LISA)</strong>';
                    div.innerHTML += '<div class="flex items-center mb-1"><i class="lisa-dot" style="background:#b91c1c"></i> 高-高集聚 (HH)</div>';
                    div.innerHTML += '<div class="flex items-center mb-1"><i class="lisa-dot" style="background:#1d4ed8"></i> 低-低集聚 (LL)</div>';
                    div.innerHTML += '<div class="flex items-center mb-1"><i class="lisa-dot" style="background:#f87171"></i> 高-低异常 (HL)</div>';
                    div.innerHTML += '<div class="flex items-center mb-1"><i class="lisa-dot" style="background:#60a5fa"></i> 低-高异常 (LH)</div>';
                } else {
                    const diff = max - min;
                    const grades = [min, min + diff * 0.05, min + diff * 0.15, min + diff * 0.3, min + diff * 0.5, min + diff * 0.7];
                    const title = document.getElementById('metricSelector').options[
                        document.getElementById('metricSelector').selectedIndex
                    ].text;
                    div.innerHTML += '<strong class="block mb-2 font-bold">' + title + '</strong>';
                    for (let i = 0; i < grades.length; i++) {
                        const test = grades[i] + diff * 0.01;
                        div.innerHTML += '<div class="flex items-center mb-1"><i style="background:' + getColor(test, min, max) + '"></i> '
                            + grades[i].toLocaleString(undefined, { maximumFractionDigits: 2 })
                            + (grades[i + 1] ? ' &ndash; ' + grades[i + 1].toLocaleString(undefined, { maximumFractionDigits: 2 }) : ' +')
                            + '</div>';
                    }
                }
                return div;
            };
            legendControl.addTo(map);
        }
    }
}


function updateChart() {
    const years = [...new Set(computedFullData.map(d => d.year))].filter(y => y != null).sort((a, b) => a - b);
    const data = [];
    const isEmission = (currentMetric === 'Carbon_Emission');

    if (selectedRegion) {
        years.forEach(y => {
            const row = computedFullData.find(d => d.year === y && d.name === selectedRegion);
            if (row && row[currentMetric] != null && !isNaN(row[currentMetric])) {
                const v = Number(row[currentMetric]);
                // 对碳排放，0 视为缺失
                data.push(isEmission && v <= 0 ? null : v);
            } else {
                data.push(null);
            }
        });
    } else {
        years.forEach(y => {
            const rows = computedFullData.filter(d => {
                if (d.year !== y || d[currentMetric] == null || isNaN(d[currentMetric])) return false;
                if (isEmission && Number(d[currentMetric]) <= 0) return false;
                return true;
            });
            data.push(rows.length
                ? rows.reduce((s, d) => s + Number(d[currentMetric]), 0) / rows.length
                : null);
        });
    }
    chartInstance.data.labels = years;
    chartInstance.data.datasets[0].data = data;
    chartInstance.update();
}


function drawSpilloverEffects(sourceName) {
    clearSpilloverLines();
    if (!regionCenters[sourceName]) return;
    const sourcePt = regionCenters[sourceName];
    const ydata = computedFullData.filter(d => d.year === currentYear);
    const sourceRow = findRowData(sourceName, ydata);
    if (!sourceRow) return;
    const sourceVal = Number(sourceRow[currentMetric]) || 0;

    Object.keys(regionCenters).forEach(targetName => {
        if (targetName === sourceName) return;
        const targetPt = regionCenters[targetName];
        const dist = haversineKm(sourcePt.lat, sourcePt.lng, targetPt.lat, targetPt.lng);

        if (dist < NEIGHBOR_THRESHOLD_KM) {
            const targetRow = findRowData(targetName, ydata);
            const targetVal = targetRow ? Number(targetRow[currentMetric]) : 0;
            const diff = sourceVal - targetVal;
            const maxVal = Math.max(...ydata.map(d => Number(d[currentMetric]) || 0), 1);
            const weight = Math.max(1, (Math.abs(diff) / maxVal) * 10 + ((NEIGHBOR_THRESHOLD_KM - dist) / NEIGHBOR_THRESHOLD_KM) * 5);
            const color = diff <= 0 ? '#3b82f6' : '#ef4444';
            const css   = diff <= 0 ? 'spillover-in' : 'spillover-out';
            const line = L.polyline([sourcePt, targetPt], { color, weight, opacity: 0.85, className: css }).addTo(map);
            line.bindTooltip(
                '<div class="text-sm"><strong>' + escapeHtml(sourceName) + '</strong> '
                + (diff <= 0 ? '被动受影响' : '输出影响')
                + ' <strong>' + escapeHtml(targetName) + '</strong><br/>HBM传导值: <strong>'
                + (weight * 8).toFixed(2) + '</strong></div>'
            );
            spilloverLines.push(line);
        }
    });
}

function clearSpilloverLines() {
    spilloverLines.forEach(l => map.removeLayer(l));
    spilloverLines = [];
}


// 【修复 #9】HTML 转义防 XSS
function escapeHtml(str) {
    if (!str) return '';
    return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
}


function updatePolicyPanel(rowData, lisaType, regionName) {
    const panel = document.getElementById('policyPanel');
    if (!rowData && !regionName) {
        panel.innerHTML = '<div class="flex h-full items-center justify-center text-slate-500 text-center border-2 border-dashed border-slate-600 rounded-lg p-4">请在右侧地图上点击目标区县，<br>系统将自动锁定行政边界，搜集数据并给出推演建议。</div>';
        return;
    }
    const region = regionName || rowData.name;
    const isPred = rowData && rowData.isPredicted;
    const predTag = isPred
        ? '<span class="ml-2 text-[10px] bg-purple-600 text-white px-2 py-0.5 rounded shadow animate-pulse">' + currentYear + ' HBM预测</span>'
        : '<span class="ml-2 text-[10px] bg-emerald-600 text-white px-2 py-0.5 rounded shadow">历史实测数据</span>';

    const carbon = (rowData && isValidEmission(rowData.Carbon_Emission))
        ? Number(rowData.Carbon_Emission).toLocaleString(undefined, { maximumFractionDigits: 2 }) + ' 吨'
        : '<span class="text-slate-500">缺失</span>';
    const gdp = (rowData && rowData.GDP != null && !isNaN(rowData.GDP))
        ? Number(rowData.GDP).toLocaleString(undefined, { maximumFractionDigits: 2 }) + ' 万元'
        : '<span class="text-slate-500">缺失</span>';
    const pop = (rowData && rowData.Population != null && !isNaN(rowData.Population))
        ? Number(rowData.Population).toLocaleString(undefined, { maximumFractionDigits: 2 }) + ' 万人'
        : '<span class="text-slate-500">缺失</span>';

    if (Object.keys(lisaResults).length === 0 && computedFullData.length > 0) {
        computeLISA(computedFullData.filter(d => d.year === currentYear));
    }
    const activeLisa = lisaType || lisaResults[region] || 'NS';
    const diag = getLisaLabel(activeLisa);
    const diagColor = getLisaColor(activeLisa);

    const policies = [];
    if (activeLisa === 'HH') {
        policies.push('1. <b>源头管控：</b>该区已被锁定为<span style="color:' + diagColor + '">高碳排集聚中心</span>，需率先发挥示范作用，严格限制"两高"项目盲目上马。');
        policies.push('2. <b>溢出截断：</b>模型显示其对周边具有强污染溢出势能，必须向周边输出绿色技术和管理经验，切断高压势能转移。');
    } else if (activeLisa === 'LL') {
        policies.push('1. <b>生态扩容：</b>作为<span style="color:' + diagColor + '">低碳排集聚区</span>，本年度应继续提升自然碳汇能力，积极参与区域碳汇市场交易。');
        policies.push('2. <b>防范虹吸：</b>警惕周边高碳区的"虹吸"或转移效应，应大力发展生态旅游与现代服务业，保持低排优势。');
    } else if (activeLisa === 'HL') {
        policies.push('1. <b>孤岛治理：</b>被低排区包围的<span style="color:' + diagColor + '">高排孤岛</span>，建议立刻进行专项减排技术攻关，打破传统工业路径依赖。');
    } else if (activeLisa === 'LH') {
        policies.push('1. <b>技术承接壁垒：</b>处于高碳包围圈中的<span style="color:' + diagColor + '">洼地</span>，极易受到污染转移影响，建议立刻建立技术环保准入门槛。');
    } else {
        policies.push('1. <b>稳健脱碳：</b>目前空间集聚特征处于平稳期，建议依靠自身产业结构优化稳步推进减排。');
        policies.push('2. <b>动态监控：</b>可利用右上方的人类活动指数(VANUI)实时监控建设强度，防止区域向高碳排极点演化。');
    }

    panel.innerHTML = '<div class="mb-3 border-b border-slate-700 pb-3">'
        + '<div class="text-gray-400 text-xs mb-1">当前焦点</div>'
        + '<div class="text-xl font-bold text-white flex items-center">' + escapeHtml(region) + ' ' + predTag + '</div>'
        + '</div>'
        + '<div class="mb-3 bg-slate-700 p-3 rounded-lg border border-slate-600 shadow-inner">'
        + '<div class="text-blue-300 font-bold text-sm mb-2 flex items-center">'
        + '<svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>'
        + currentYear + ' 年度矩阵验算数据档案</div>'
        + '<div class="grid grid-cols-2 gap-2 text-xs text-gray-200">'
        + '<div class="bg-slate-800 p-1.5 rounded"><span class="text-gray-400 block mb-0.5">碳排放量</span><span class="font-bold text-sm text-yellow-400">' + carbon + '</span></div>'
        + '<div class="bg-slate-800 p-1.5 rounded"><span class="text-gray-400 block mb-0.5">GDP 生产总值</span><span class="font-bold text-sm">' + gdp + '</span></div>'
        + '<div class="bg-slate-800 p-1.5 rounded"><span class="text-gray-400 block mb-0.5">人口数量</span><span class="font-bold text-sm">' + pop + '</span></div>'
        + '<div class="bg-slate-800 p-1.5 rounded flex items-center">空间集聚：<span style="color:' + diagColor + '; font-weight:bold; margin-left:4px;">' + diag + '</span></div>'
        + '</div></div>'
        + '<div class="space-y-2 mt-2">'
        + '<div class="text-emerald-300 font-bold text-sm mb-1 flex items-center">'
        + '<svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>'
        + '基于 HBM 的智能政策预案：</div>'
        + policies.map(p => '<div class="text-sm leading-snug text-gray-200 pl-3 border-l-2 border-emerald-500">' + p + '</div>').join('')
        + '</div>';
}
